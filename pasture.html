<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smurf Pasture — Themed Neurons</title>
<meta name="description" content="A 3D Smurf village built with Babylon.js — giant mushroom houses, cows, cats, dogs, and flowers.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2a2018;--ink-soft:#5a4a3a;--muted:#8a7a68;--paper:#f6efe3;--paper-2:#efe5d4;
    --gold:#c08a2d;--gold-deep:#9a6817;--amber:#d9a441;--border:#e0d2bb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--paper);font-family:'Inter',system-ui,sans-serif}
  .top-bar{
    position:fixed;top:0;left:0;right:0;z-index:10;
    display:flex;align-items:center;gap:16px;
    padding:12px 20px;
    background:linear-gradient(180deg,rgba(246,239,227,.95),rgba(246,239,227,.8));
    border-bottom:1px solid var(--border);backdrop-filter:blur(8px);
  }
  .top-bar .brand{font-family:'Fraunces',serif;font-weight:600;color:var(--ink);font-size:1.1rem;text-decoration:none}
  .top-bar .brand:hover{color:var(--gold-deep)}
  .top-bar .sep{color:var(--border)}
  .top-bar .page-title{font-size:.9rem;color:var(--ink-soft);font-weight:500}
  .top-bar .spacer{flex:1}
  .top-bar .back{
    display:inline-flex;align-items:center;gap:6px;
    font-size:.82rem;color:var(--gold-deep);font-weight:600;text-decoration:none;
    padding:6px 14px;border:1px solid var(--border);border-radius:999px;
    background:var(--paper);
  }
  .top-bar .back:hover{border-color:var(--gold)}
  #renderCanvas{width:100%;height:100%;display:block}
  .info{
    position:fixed;bottom:20px;left:20px;z-index:10;
    color:var(--ink-soft);font-size:.85rem;
    background:rgba(246,239,227,.85);padding:10px 16px;border-radius:8px;
    border:1px solid var(--border);pointer-events:none;
    backdrop-filter:blur(4px);
  }
</style>
</head>
<body>
<div class="top-bar">
  <a class="brand" href="index.html">Themed Neurons</a>
  <span class="sep">/</span>
  <span class="page-title">Smurf Pasture</span>
  <span class="spacer"></span>
  <a class="back" href="index.html">← Back to site</a>
</div>
<canvas id="renderCanvas"></canvas>
<div class="info">Click and drag to orbit · Scroll to zoom</div>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script>
const canvas=document.getElementById("renderCanvas");
const engine=new BABYLON.Engine(canvas,true,{preserveDrawingBuffer:true,stencil:true});
const scene=new BABYLON.Scene(engine);
scene.clearColor=new BABYLON.Color4(0.53,0.81,0.98,1.0);
const camera=new BABYLON.ArcRotateCamera("cam",Math.PI/4,Math.PI/3,30,new BABYLON.Vector3(0,3,0),scene);
camera.attachControl(canvas,true);
camera.lowerRadiusLimit=8;camera.upperRadiusLimit=60;camera.wheelDeltaPercentage=0.02;
const hemi=new BABYLON.HemisphericLight("hemi",new BABYLON.Vector3(0,1,0),scene);
hemi.intensity=0.6;hemi.diffuse=new BABYLON.Color3(1,0.95,0.85);
const sun=new BABYLON.DirectionalLight("sun",new BABYLON.Vector3(-5,-10,-3),scene);
sun.intensity=1.2;sun.diffuse=new BABYLON.Color3(1,0.95,0.8);
const ground=BABYLON.MeshBuilder.CreateGround("ground",{width:80,height:80,subdivisions:4},scene);
const grassMat=new BABYLON.StandardMaterial("grass",scene);grassMat.diffuseColor=new BABYLON.Color3(0.25,0.55,0.18);grassMat.specularColor=new BABYLON.Color3(0.05,0.1,0.02);ground.material=grassMat;
const path=BABYLON.MeshBuilder.CreateGround("path",{width:3,height:30,subdivisions:2},scene);path.position.set(4,0.01,0);
const pathMat=new BABYLON.StandardMaterial("path",scene);pathMat.diffuseColor=new BABYLON.Color3(0.76,0.65,0.42);path.material=pathMat;
function createMushroom(x,z,scale,capColor,spotColor){
  const stem=BABYLON.MeshBuilder.CreateCylinder("stem",{height:3*scale,diameterTop:0.6*scale,diameterBottom:0.9*scale,tessellation:12},scene);stem.position.set(x,1.5*scale,z);
  const stemMat=new BABYLON.StandardMaterial("stemMat"+x+z,scene);stemMat.diffuseColor=new BABYLON.Color3(0.92,0.85,0.7);stem.material=stemMat;
  const cap=BABYLON.MeshBuilder.CreateSphere("cap",{diameter:2.5*scale,slice:0.5,tessellation:24},scene);cap.position.set(x,3.2*scale,z);cap.scaling=new BABYLON.Vector3(1,0.45,1);
  const capMat=new BABYLON.StandardMaterial("capMat"+x+z,scene);capMat.diffuseColor=capColor;cap.material=capMat;
  const spotCount=Math.floor(5+scale*3);
  for(let i=0;i<spotCount;i++){const angle=Math.random()*Math.PI*2;const r=Math.random()*0.8*scale;const spot=BABYLON.MeshBuilder.CreateSphere("spot",{diameter:0.25*scale,tessellation:8},scene);spot.position.set(x+Math.cos(angle)*r,3.3*scale+Math.random()*0.2*scale,z+Math.sin(angle)*r);const spotMat=new BABYLON.StandardMaterial("spotMat"+x+z+i,scene);spotMat.diffuseColor=spotColor;spot.material=spotMat;}
}
createMushroom(-6,-4,2.0,new BABYLON.Color3(0.85,0.12,0.1),new BABYLON.Color3(0.95,0.95,0.92));
createMushroom(-3,-8,1.5,new BABYLON.Color3(0.85,0.12,0.1),new BABYLON.Color3(0.95,0.95,0.92));
createMushroom(-8,2,1.8,new BABYLON.Color3(0.85,0.12,0.1),new BABYLON.Color3(0.95,0.95,0.92));
createMushroom(8,-6,1.3,new BABYLON.Color3(0.85,0.12,0.1),new BABYLON.Color3(0.95,0.95,0.92));
createMushroom(6,5,1.6,new BABYLON.Color3(0.55,0.15,0.7),new BABYLON.Color3(0.9,0.85,0.95));
createMushroom(-10,-2,1.2,new BABYLON.Color3(0.15,0.3,0.8),new BABYLON.Color3(0.85,0.9,0.98));
for(let i=0;i<12;i++){const sx=(Math.random()-0.5)*40;const sz=(Math.random()-0.5)*40;const sc=0.3+Math.random()*0.5;const colors=[[0.85,0.12,0.1],[0.95,0.6,0.1],[0.55,0.15,0.7],[0.15,0.6,0.3]];const c=colors[Math.floor(Math.random()*colors.length)];createMushroom(sx,sz,sc,new BABYLON.Color3(c[0],c[1],c[2]),new BABYLON.Color3(0.95,0.95,0.92));}
function createSmurfHouse(x,z){
  const body=BABYLON.MeshBuilder.CreateSphere("houseBody",{diameter:3,slice:0.5,tessellation:24},scene);body.position.set(x,1.5,z);body.scaling=new BABYLON.Vector3(1,0.7,1);
  const bodyMat=new BABYLON.StandardMaterial("houseBodyMat",scene);bodyMat.diffuseColor=new BABYLON.Color3(0.85,0.12,0.1);body.material=bodyMat;
  const roof=BABYLON.MeshBuilder.CreateSphere("houseRoof",{diameter:3.5,slice:0.4,tessellation:24},scene);roof.position.set(x,3.2,z);roof.scaling=new BABYLON.Vector3(1,0.4,1);
  const roofMat=new BABYLON.StandardMaterial("roofMat",scene);roofMat.diffuseColor=new BABYLON.Color3(0.85,0.12,0.1);roof.material=roofMat;
  for(let i=0;i<6;i++){const a=Math.random()*Math.PI*2;const r=Math.random()*1.2;const sp=BABYLON.MeshBuilder.CreateSphere("hSpot",{diameter:0.3,tessellation:8},scene);sp.position.set(x+Math.cos(a)*r,3.3+Math.random()*0.15,z+Math.sin(a)*r);const sm=new BABYLON.StandardMaterial("hSpotMat",scene);sm.diffuseColor=new BABYLON.Color3(0.95,0.95,0.92);sp.material=sm;}
  const door=BABYLON.MeshBuilder.CreateBox("door",{width:0.7,height:1.2,depth:0.1},scene);door.position.set(x,0.6,z+1.5);
  const doorMat=new BABYLON.StandardMaterial("doorMat",scene);doorMat.diffuseColor=new BABYLON.Color3(0.4,0.2,0.05);door.material=doorMat;
  const win=BABYLON.MeshBuilder.CreateBox("win",{width:0.4,height:0.4,depth:0.1},scene);win.position.set(x+0.8,1.2,z+1.5);
  const winMat=new BABYLON.StandardMaterial("winMat",scene);winMat.diffuseColor=new BABYLON.Color3(0.6,0.85,0.95);winMat.emissiveColor=new BABYLON.Color3(0.1,0.15,0.1);win.material=winMat;
}
createSmurfHouse(-14,-10);
function createCow(x,z,rotY){
  const mat,spotMat,head,snout,eye,ear,leg,tail,hx,hz,tx,tz;
  const mat=new BABYLON.StandardMaterial("cowMat"+x+z,scene);mat.diffuseColor=new BABYLON.Color3(0.95,0.93,0.88);
  const body=BABYLON.MeshBuilder.CreateBox("cowBody",{width:1.8,height:1.0,depth:0.9},scene);body.position.set(x,0.9,z);body.rotation.y=rotY;body.material=mat;
  const spotMat=new BABYLON.StandardMaterial("cowSpot"+x+z,scene);spotMat.diffuseColor=new BABYLON.Color3(0.15,0.12,0.1);
  for(let i=0;i<4;i++){const sp=BABYLON.MeshBuilder.CreateBox("cSpot",{width:0.35,height:0.35,depth:0.1},scene);sp.position.set(x+(Math.random()-0.5)*1.2,0.9+(Math.random()-0.5)*0.5,z+0.45*(Math.random()>0.5?1:-1));sp.rotation.y=rotY;sp.material=spotMat;}
  const head=BABYLON.MeshBuilder.CreateBox("cowHead",{width:0.55,height:0.55,depth:0.5},scene);const hx=x+Math.sin(rotY)*1.1;const hz=z+Math.cos(rotY)*1.1;head.position.set(hx,1.1,hz);head.rotation.y=rotY;head.material=mat;
  const snout=BABYLON.MeshBuilder.CreateBox("snout",{width:0.35,height:0.25,depth:0.2},scene);snout.position.set(hx+Math.sin(rotY)*0.35,0.95,hz+Math.cos(rotY)*0.35);snout.rotation.y=rotY;const snoutMat=new BABYLON.StandardMaterial("snoutMat"+x+z,scene);snoutMat.diffuseColor=new BABYLON.Color3(0.85,0.7,0.65);snout.material=snoutMat;
  for(const side of[-1,1]){const eye=BABYLON.MeshBuilder.CreateSphere("eye",{diameter:0.08,tessellation:8},scene);eye.position.set(hx+Math.sin(rotY)*0.28+Math.cos(rotY)*side*0.18,1.2,hz+Math.cos(rotY)*0.28-Math.sin(rotY)*side*0.18);const eyeMat=new BABYLON.StandardMaterial("eyeMat",scene);eyeMat.diffuseColor=new BABYLON.Color3(0.1,0.08,0.05);eye.material=eyeMat;}
  for(const side of[-1,1]){const ear=BABYLON.MeshBuilder.CreateBox("ear",{width:0.15,height:0.2,depth:0.08},scene);ear.position.set(hx+Math.cos(rotY)*side*0.3,1.35,hz-Math.sin(rotY)*side*0.3);ear.rotation.y=rotY;ear.material=mat;}
  for(const[lx,lz]of[[-0.5,-0.3],[-0.5,0.3],[0.5,-0.3],[0.5,0.3]]){const leg=BABYLON.MeshBuilder.CreateBox("cowLeg",{width:0.18,height:0.6,depth:0.18},scene);leg.position.set(x+lx,0.3,z+lz);leg.rotation.y=rotY;const legMat=new BABYLON.StandardMaterial("legMat",scene);legMat.diffuseColor=new BABYLON.Color3(0.9,0.88,0.82);leg.material=legMat;}
  const tail=BABYLON.MeshBuilder.CreateCylinder("tail",{height:0.6,diameterTop:0.03,diameterBottom:0.08,tessellation:6},scene);const tx=x-Math.sin(rotY)*1.0;const tz=z-Math.cos(rotY)*1.0;tail.position.set(tx,1.0,tz);tail.rotation.x=0.3;tail.rotation.y=rotY;tail.material=mat;
}
createCow(5,-2,0.3);createCow(8,3,-0.5);createCow(2,6,1.2);
function createCat(x,z,rotY){
  const catMat=new BABYLON.StandardMaterial("catMat"+x+z,scene);catMat.diffuseColor=new BABYLON.Color3(0.95,0.55,0.15);
  const body=BABYLON.MeshBuilder.CreateCapsule("catBody",{height:0.6,radius:0.2},scene);body.position.set(x,0.35,z);body.rotation.y=rotY;body.material=catMat;
  const head=BABYLON.MeshBuilder.CreateSphere("catHead",{diameter:0.3,tessellation:12},scene);const hx=x+Math.sin(rotY)*0.4;const hz=z+Math.cos(rotY)*0.4;head.position.set(hx,0.55,hz);head.material=catMat;
  for(const side of[-1,1]){const ear=BABYLON.MeshBuilder.CreateCylinder("catEar",{height:0.15,diameterTop:0,diameterBottom:0.12,tessellation:3},scene);ear.position.set(hx+Math.cos(rotY)*side*0.1,0.72,hz-Math.sin(rotY)*side*0);ear.rotation.y=rotY;ear.material=catMat;}
  for(const side of[-1,1]){const eye=BABYLON.MeshBuilder.CreateSphere("catEye",{diameter:0.05,tessellation:8},scene);eye.position.set(hx+Math.sin(rotY)*0.15+Math.cos(rotY)*side*0.08,0.58,hz+Math.cos(rotY)*0.15-Math.sin(rotY)*side*0.08);const eyeMat=new BABYLON.StandardMaterial("catEyeMat",scene);eyeMat.diffuseColor=new BABYLON.Color3(0.2,0.6,0.15);eye.material=eyeMat;}
  const tail=BABYLON.MeshBuilder.CreateCylinder("catTail",{height:0.5,diameterTop:0.03,diameterBottom:0.06,tessellation:6},scene);const tx=x-Math.sin(rotY)*0.4;const tz=z-Math.cos(rotY)*0.4;tail.position.set(tx,0.5,tz);tail.rotation.x=-0.5;tail.rotation.y=rotY;tail.material=catMat;
}
createCat(-4,5,0.8);createCat(10,-4,-1.0);
function createDog(x,z,rotY){
  const dogMat=new BABYLON.StandardMaterial("dogMat"+x+z,scene);dogMat.diffuseColor=new BABYLON.Color3(0.55,0.35,0.15);
  const body=BABYLON.MeshBuilder.CreateBox("dogBody",{width:1.0,height:0.6,depth:0.5},scene);body.position.set(x,0.6,z);body.rotation.y=rotY;body.material=dogMat;
  const head=BABYLON.MeshBuilder.CreateBox("dogHead",{width:0.45,height:0.45,depth:0.45},scene);const hx=x+Math.sin(rotY)*0.65;const hz=z+Math.cos(rotY)*0.65;head.position.set(hx,0.75,hz);head.rotation.y=rotY;head.material=dogMat;
  const snout=BABYLON.MeshBuilder.CreateBox("dogSnout",{width:0.25,height:0.2,depth:0.25},scene);snout.position.set(hx+Math.sin(rotY)*0.28,0.65,hz+Math.cos(rotY)*0.28);snout.rotation.y=rotY;const snoutMat=new BABYLON.StandardMaterial("dogSnoutMat"+x+z,scene);snoutMat.diffuseColor=new BABYLON.Color3(0.4,0.28,0.12);snout.material=snoutMat;
  const nose=BABYLON.MeshBuilder.CreateSphere("dogNose",{diameter:0.07,tessellation:8},scene);nose.position.set(hx+Math.sin(rotY)*0.4,0.68,hz+Math.cos(rotY)*0.4);const noseMat=new BABYLON.StandardMaterial("noseMat",scene);noseMat.diffuseColor=new BABYLON.Color3(0.1,0.08,0.05);nose.material=noseMat;
  for(const side of[-1,1]){const eye=BABYLON.MeshBuilder.CreateSphere("dogEye",{diameter:0.06,tessellation:8},scene);eye.position.set(hx+Math.sin(rotY)*0.22+Math.cos(rotY)*side*0.12,0.82,hz+Math.cos(rotY)*0.22-Math.sin(rotY)*side*0.12);const eyeMat=new BABYLON.StandardMaterial("dogEyeMat",scene);eyeMat.diffuseColor=new BABYLON.Color3(0.15,0.1,0.05);eye.material=eyeMat;}
  for(const side of[-1,1]){const ear=BABYLON.MeshBuilder.CreateBox("dogEar",{width:0.12,height:0.25,depth:0.06},scene);ear.position.set(hx+Math.cos(rotY)*side*0.2,0.7,hz-Math.sin(rotY)*side*0.2);ear.rotation.y=rotY;ear.rotation.z=side*0.3;ear.material=dogMat;}
  for(const[lx,lz]of[[-0.3,-0.15],[-0.3,0.15],[0.3,-0.15],[0.3,0.15]]){const leg=BABYLON.MeshBuilder.CreateBox("dogLeg",{width:0.12,height:0.4,depth:0.12},scene);leg.position.set(x+lx,0.2,z+lz);leg.rotation.y=rotY;leg.material=dogMat;}
  const tail=BABYLON.MeshBuilder.CreateCylinder("dogTail",{height:0.35,diameterTop:0.03,diameterBottom:0.07,tessellation:6},scene);const tx=x-Math.sin(rotY)*0.55;const tz=z-Math.cos(rotY)*0.55;tail.position.set(tx,0.85,tz);tail.rotation.x=-0.8;tail.rotation.y=rotY;tail.material=dogMat;
}
createDog(7,7,-0.4);createDog(-7,6,1.0);createDog(12,1,0.0);
for(let i=0;i<30;i++){const fx=(Math.random()-0.5)*50;const fz=(Math.random()-0.5)*50;const stem=BABYLON.MeshBuilder.CreateCylinder("stem",{height:0.3,diameterTop:0.02,diameterBottom:0.03,tessellation:4},scene);stem.position.set(fx,0.15,fz);const stemMat=new BABYLON.StandardMaterial("stemMat"+i,scene);stemMat.diffuseColor=new BABYLON.Color3(0.2,0.5,0.15);stem.material=stemMat;const flowerColors=[[0.95,0.3,0.5],[0.95,0.85,0.2],[0.95,0.5,0.1],[0.7,0.3,0.9],[0.95,0.95,0.95],[0.3,0.6,0.95]];const fc=flowerColors[Math.floor(Math.random()*flowerColors.length)];const bloom=BABYLON.MeshBuilder.CreateSphere("flower",{diameter:0.12,tessellation:8},scene);bloom.position.set(fx,0.33,fz);const bloomMat=new BABYLON.StandardMaterial("flowerMat"+i,scene);bloomMat.diffuseColor=new BABYLON.Color3(fc[0],fc[1],fc[2]);bloom.material=bloomMat;}
function createFence(x,z,rotY,length){const postMat=new BABYLON.StandardMaterial("fencePost"+x+z,scene);postMat.diffuseColor=new BABYLON.Color3(0.45,0.3,0.12);const count=Math.floor(length/2)+1;for(let i=0;i<count;i++){const px=x+Math.sin(rotY)*i*2;const pz=z+Math.cos(rotY)*i*2;const post=BABYLON.MeshBuilder.CreateBox("fencePost",{width:0.1,height:0.8,depth:0.1},scene);post.position.set(px,0.4,pz);post.rotation.y=rotY;post.material=postMat;}for(const h of[0.25,0.55]){const rail=BABYLON.MeshBuilder.CreateBox("rail",{width:0.06,height:0.06,depth:length},scene);const rx=x+Math.sin(rotY)*(length/2-1);const rz=z+Math.cos(rotY)*(length/2-1);rail.position.set(rx,h,rz);rail.rotation.y=rotY;rail.material=postMat;}}
createFence(-5,-12,0,20);createFence(15,-5,Math.PI/2,16);
for(let i=0;i<8;i++){const cx=(Math.random()-0.5)*60;const cy=12+Math.random()*5;const cz=(Math.random()-0.5)*60;for(let j=0;j<5;j++){const puff=BABYLON.MeshBuilder.CreateSphere("cloud",{diameter:1.5+Math.random()*2,tessellation:8},scene);puff.position.set(cx+(Math.random()-0.5)*3,cy+(Math.random()-0.5)*0.8,cz+(Math.random()-0.5)*3);puff.scaling=new BABYLON.Vector3(1,0.5,1);const cloudMat=new BABYLON.StandardMaterial("cloudMat",scene);cloudMat.diffuseColor=new BABYLON.Color3(0.98,0.98,1.0);cloudMat.alpha=0.85;puff.material=cloudMat;}}
for(let i=0;i<200;i++){const gx=(Math.random()-0.5)*50;const gz=(Math.random()-0.5)*50;const gh=0.15+Math.random()*0.25;const blade=BABYLON.MeshBuilder.CreateBox("blade",{width:0.02,height:gh,depth:0.02},scene);blade.position.set(gx,gh/2,gz);blade.rotation.y=Math.random()*Math.PI;const bladeMat=new BABYLON.StandardMaterial("bladeMat"+i,scene);const gc=0.2+Math.random()*0.2;bladeMat.diffuseColor=new BABYLON.Color3(gc*0.7,gc*1.4,gc*0.5);blade.material=bladeMat;}
engine.runRenderLoop(()=>scene.render());
window.addEventListener("resize",()=>engine.resize());
</script>
</body>
</html>
